{% load static %}
<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="TradeSims — Practice stock trading risk-free with real market data, powerful analytics, and a beautiful dashboard." />
        <title>
            {% block title %}
            TradeSims — Learn. Practice. Invest Smarter.
            {% endblock %}
        </title>
    
        <link 
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
    
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
        
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap"
            rel="stylesheet"/>
    
        <link rel="stylesheet" href="{% static 'simulator/css/styles.css' %}" />

        {% block extra_css %}
        {% endblock %}
    </head>

    <body>
        {% include "components/navbar.html" %}

        {% block content %}
        {% endblock %}

        {% include "components/footer.html" %}
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmTJ4JOf2gZR7jcZ4J9Wfxyz/l7"
            crossorigin="anonymous">
        </script>

        <!-- Custom JS -->
        <script src="{% static 'simulator/js/script.js' %}"></script>
        
        {% block extra_js %}
        {% endblock %}
        
    </body>
</html>
