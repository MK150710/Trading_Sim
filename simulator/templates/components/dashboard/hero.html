<section class="hero reveal" id="heroSection">
    <div class="hero__eyebrow">
        <span id="heroEyebrowIcon"></span>
        <span>Your portfolio</span>
    </div>
    <h1 class="hero__greeting">
        <span id="greetingText">Good morning</span>,&nbsp;Jordan
    </h1>

    <div class="hero__stats" id="heroStats">
        <div class="stat-block">
            <div class="stat-block__label">Total value</div>
            <div class="stat-block__value num" id="heroTotalValue">—</div>
        </div>
        <div class="stat-block__divider"></div>

        <div class="stat-block">
            <div class="stat-block__label">Today's change</div>
            <div class="stat-block__value stat-block__value--md num" id="heroTodayChange">—</div>
        </div>
        <div class="stat-block__divider"></div>

        <div class="stat-block">
            <div class="stat-block__label">Buying power</div>
            <div class="stat-block__value stat-block__value--md num" id="heroBuyingPower">—</div>
        </div>
        <div class="stat-block__divider"></div>

        <div class="stat-block">
            <div class="stat-block__label">Change %</div>
            <div class="stat-block__value stat-block__value--md num" id="heroTodayChangePercent">—</div>
        </div>
    </div>
</section>
