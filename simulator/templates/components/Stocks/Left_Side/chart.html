<section class="ts-section reveal" aria-label="Price chart">
    <div class="ts-section__head">
        <div class="ts-section__title">Price Chart</div>
    </div>

    <div class="ts-chart-toolbar">
        <div class="ts-timeframes" role="tablist" aria-label="Chart timeframe">
            <button data-tf="1D" class="is-active">1D</button>
            <button data-tf="5D">5D</button>
            <button data-tf="1M">1M</button>
            <button data-tf="3M">3M</button>
            <button data-tf="6M">6M</button>
            <button data-tf="YTD">YTD</button>
            <button data-tf="1Y">1Y</button>
            <button data-tf="5Y">5Y</button>
            <button data-tf="MAX">MAX</button>
        </div>
    </div>
    <div id="chart-skeleton" class="sk" style="height: 340px;border-radius:var(--r-md)"></div>
    <div class="chart-content" aria-colspan="ts-chart-wrap" style="display: none">
        <canvas id="chart-canvas"></canvas>
        <div id="chart-tooltip" class="ts-chart-tooltip"><div class="price">$0.00</div><div class="date">—</div></div>
    </div>
    <div id="chart-range-summary" class="ts-chart-range-summary"></div>
</section>
